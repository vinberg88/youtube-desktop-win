<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TubeDesk for Windows</title>
  <style>
    :root{--bg:#070707;--panel:#111;--panel2:#1b1b1b;--line:#2b2b2b;--text:#f5f5f5;--muted:#a1a1aa;--red:#ff0033}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#2a0710,#070707 42%,#020202);color:var(--text);font-family:Segoe UI,Arial,sans-serif;overflow:hidden}
    #app{height:100vh;display:grid;grid-template-rows:54px 3px minmax(0,1fr) 28px}
    #toolbar{display:flex;gap:8px;align-items:center;padding:8px 10px;background:rgba(12,12,12,.95);border-bottom:1px solid var(--line)}
    .brand{font-weight:800;color:#ff4d6d;white-space:nowrap} button{background:linear-gradient(#282828,#171717);color:white;border:1px solid #3a3a3a;border-radius:10px;padding:8px 10px;cursor:pointer}button:hover{border-color:#666}button.active{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset}
    #url{flex:1;background:#0b0b0b;color:#eee;border:1px solid #333;border-radius:10px;padding:9px 12px;outline:none}.main{display:grid;grid-template-columns:240px minmax(0,1fr);height:100%;min-height:0;overflow:hidden}.side{border-right:1px solid var(--line);background:rgba(12,12,12,.82);padding:14px;overflow:auto}.side h3{margin:6px 0 10px;font-size:13px;color:var(--muted);text-transform:uppercase}.link{display:block;width:100%;text-align:left;margin:6px 0}.content{position:relative;min-width:0;min-height:0;overflow:hidden}webview{width:100%;height:100%;background:#080808;display:inline-flex}
    #start{position:absolute;inset:0;z-index:2;background:radial-gradient(circle at top,#261019,#080808 55%);padding:42px;overflow:auto}.hero{max-width:900px;margin:auto}.hero h1{font-size:46px;margin:0 0 10px}.hero p{color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-top:26px}.card{background:rgba(255,255,255,.05);border:1px solid #303030;border-radius:18px;padding:18px;cursor:pointer}.card:hover{border-color:#666}.hidden{display:none!important}#progress{height:3px;background:var(--red);width:0;transition:.2s}.status{font-size:12px;color:var(--muted);display:flex;align-items:center;padding:0 10px;border-top:1px solid var(--line);background:#0b0b0b}#toast{position:absolute;right:18px;bottom:42px;background:#181818;border:1px solid #444;border-radius:12px;padding:12px 14px;display:none}.focus .side,.focus #toolbar,.focus .status{display:none}.focus #app{display:block;height:100vh}.focus .main{grid-template-columns:1fr;height:100vh}
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="brand">▶ TubeDesk</div><button id="back">←</button><button id="forward">→</button><button id="reload">⟳</button><button id="home">Hem</button><button id="startBtn">Start</button>
      <input id="url" placeholder="Sök på YouTube eller skriv URL" /><button id="go">Gå</button><button id="top">Top</button><button id="mini">Mini</button><button id="mute">Mute</button><button id="focus">Fokus</button>
    </div>
    <div id="progress"></div>
    <div class="main">
      <aside class="side"><h3>Snabbval</h3><button class="link" data-cmd="home">YouTube Home</button><button class="link" data-cmd="subscriptions">Prenumerationer</button><button class="link" data-cmd="music">YouTube Music</button><button class="link" data-cmd="trending">Trending</button><button class="link" data-cmd="history">Historik</button><button class="link" data-cmd="later">Watch Later</button><h3>Verktyg</h3><button class="link" data-cmd="start">Startsida</button><button class="link" id="external">Öppna externt</button><button class="link" id="clear">Rensa login/session</button><button class="link" id="zoomIn">Zoom +</button><button class="link" id="zoomOut">Zoom -</button><button class="link" id="zoomReset">Zoom 100%</button></aside>
      <main class="content"><section id="start"><div class="hero"><h1>TubeDesk for Windows</h1><p>En snygg, inofficiell Windows-wrapper för YouTube och YouTube Music med persistent login, mini-player, tray, fokusläge och snabbkommandon.</p><div class="cards"><div class="card" data-cmd="home">YouTube Home</div><div class="card" data-cmd="subscriptions">Prenumerationer</div><div class="card" data-cmd="music">YouTube Music</div><div class="card" data-cmd="trending">Trending</div></div></div></section><webview id="youtube" src="https://www.youtube.com" partition="persist:youtube" allowpopups></webview><div id="toast"></div></main>
    </div>
    <div class="status"><span id="status">Redo</span><span style="margin-left:auto" id="appInfo"></span></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
