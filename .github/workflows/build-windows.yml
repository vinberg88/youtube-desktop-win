name: Build Windows Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "main.js"
      - "preload.js"
      - "renderer.js"
      - "index.html"
      - "mini.html"
      - "assets/**"
      - ".github/workflows/build-windows.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build NSIS installer
        run: npm run build -- --publish never

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeDesk-Windows-NSIS
          path: dist/*
          if-no-files-found: error

  build-store:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Microsoft Store package
        run: npm run build:store -- --publish never

      - name: Upload Store artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeDesk-Windows-Store-Package
          path: |
            dist/*.appx
            dist/*.msix
          if-no-files-found: error
