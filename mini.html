<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TubeDesk Mini Player</title>
  <style>
    html,body{margin:0;width:100%;height:100%;background:#080808;color:#f5f5f5;font-family:Segoe UI,Arial,sans-serif;overflow:hidden}
    #bar{height:34px;display:flex;gap:6px;align-items:center;padding:4px 6px;background:#111;border-bottom:1px solid #2b2b2b}
    button{background:#222;color:white;border:1px solid #444;border-radius:8px;padding:5px 8px;cursor:pointer}button:hover{border-color:#777}
    input{flex:1;background:#0b0b0b;color:#eee;border:1px solid #333;border-radius:8px;padding:6px 8px;outline:none;min-width:0}
    webview{width:100%;height:calc(100% - 34px);display:inline-flex;background:#080808}
  </style>
</head>
<body>
  <div id="bar"><strong>TubeDesk Mini</strong><input id="url" placeholder="Enter a media URL" /><button id="go">Go</button></div>
  <webview id="miniView" src="about:blank" partition="persist:tubedesk" allowpopups></webview>
  <script>
    const params = new URLSearchParams(location.search);
    const miniView = document.getElementById("miniView");
    const urlInput = document.getElementById("url");
    const initialUrl = params.get("url") || "about:blank";

    function normalizeUrl(value) {
      const input = value.trim();
      if (!input) return "about:blank";
      if (input.startsWith("http://") || input.startsWith("https://")) return input;
      if (input.includes(".") && !input.includes(" ")) return `https://${input}`;
      return `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
    }

    function go(value) {
      const nextUrl = normalizeUrl(value);
      miniView.src = nextUrl;
      if (nextUrl !== "about:blank") urlInput.value = nextUrl;
    }

    if (initialUrl !== "about:blank") go(initialUrl);
    document.getElementById("go").addEventListener("click", () => go(urlInput.value));
    urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") go(urlInput.value);
    });
    miniView.addEventListener("did-navigate", (event) => {
      if (event.url && event.url !== "about:blank") urlInput.value = event.url;
    });
    miniView.addEventListener("did-navigate-in-page", (event) => {
      if (event.url && event.url !== "about:blank") urlInput.value = event.url;
    });
  </script>
</body>
</html>
